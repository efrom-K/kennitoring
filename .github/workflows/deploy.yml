name: Deploy Kennitoring to NUC

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Restart Container
        run: |
          # Переходим в рабочую директорию (раннер сам создаст её при checkout)
          docker compose up -d --build
          
      - name: Cleanup old images
        run: |
          # Удаляем зависшие слои, чтобы не забивать SSD на NUC
          docker image prune -f